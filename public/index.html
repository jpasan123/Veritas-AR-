<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a1628" />
  <title>Veritas AR</title>
  <link rel="preload" href="assets/veritas-background.jpg" as="image" type="image/jpeg" fetchpriority="high" />
  <script src="js/model-preload.js" defer></script>
  <link rel="stylesheet" href="css/style.css?v=5" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet" /></noscript>
</head>
<body>
  <div class="page-bg" role="presentation">
    <img
      src="assets/veritas-background.jpg"
      alt=""
      class="page-bg-img"
      width="1572"
      height="3408"
      fetchpriority="high"
      decoding="async"
    />
  </div>
  <div class="page-overlay" role="presentation"></div>

  <main class="landing">
    <div class="camera-spot">
      <a href="ar.html" class="camera-btn" aria-label="Start AR Camera">
        <span class="camera-btn-ring"></span>
        <span class="camera-btn-inner">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 7h4l2-3h4l2 3h4v12H4V7z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <circle cx="12" cy="13" r="3.2" stroke="currentColor" stroke-width="1.6"/>
          </svg>
        </span>
      </a>
      <p class="camera-label">Open Camera</p>
    </div>
  </main>
  <script src="js/visit-config.js" defer></script>
  <script src="js/visit-track.js" defer></script>
  <script src="js/landing-fit.js?v=3" defer></script>
</body>
</html>
